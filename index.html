<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#5e72e4" />
    <link rel="apple-touch-icon" href="%BASE_URL%pwa-icon.svg" />
    <title>AI POS</title>
    <script>
      (function () {
        var base = '%BASE_URL%';
        if (!base || base === '/') return;
        var basePath = base.endsWith('/') ? base.slice(0, -1) : base;
        var path = window.location.pathname || '/';
        if (path === basePath || path.startsWith(basePath + '/')) return;
        var nextPath = path.replace(/^\//, '');
        window.location.replace(base + nextPath + window.location.search + window.location.hash);
      })();
    </script>
    <!-- Fonts and icons -->
    <link
      href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700"
      rel="stylesheet"
    />
    <!-- Icons: react-icons in src/components (Header, Sidebar, Dashboard) -->
    <!-- CSS Files -->
    <link id="pagestyle" href="%BASE_URL%assets/css/argon-dashboard.min.css?v=2.1.0" rel="stylesheet" />
    <link href="%BASE_URL%assets/css/pos-sidenav-override.css?v=8" rel="stylesheet" />
  </head>
  <body class="bg-gray-100">
    <div id="root"></div>
    <script type="module" src="/src/index.js"></script>
    <!-- Core JS Files -->
    <script src="%BASE_URL%assets/js/core/popper.min.js"></script>
    <script src="%BASE_URL%assets/js/core/bootstrap.min.js"></script>
    <script src="%BASE_URL%assets/js/plugins/perfect-scrollbar.min.js"></script>
    <script src="%BASE_URL%assets/js/plugins/smooth-scrollbar.min.js"></script>
    <!-- Kanban scripts -->
    <script src="%BASE_URL%assets/js/plugins/dragula/dragula.min.js"></script>
    <script src="%BASE_URL%assets/js/plugins/jkanban/jkanban.js"></script>
    <script src="%BASE_URL%assets/js/plugins/chartjs.min.js"></script>
    <script src="%BASE_URL%assets/js/plugins/datatables.js"></script>
    <!-- Github buttons -->
    <script async defer src="https://buttons.github.io/buttons.js"></script>
    <!-- Control Center for Argon Dashboard -->
    <script src="%BASE_URL%assets/js/argon-dashboard.min.js?v=2.1.0"></script>
  </body>
</html>
